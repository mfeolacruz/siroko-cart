services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: siroko_cart_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
    environment:
      - PHP_IDE_CONFIG=serverName=siroko-cart
      - APP_ENV=${APP_ENV:-dev}
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - siroko_network
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.25-alpine
    container_name: siroko_cart_nginx
    ports:
      - "${NGINX_PORT:-8081}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - siroko_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: siroko_cart_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_EXTERNAL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - siroko_network

  redis:
    image: redis:7.2-alpine
    container_name: siroko_cart_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - siroko_network

volumes:
  mysql_data:

networks:
  siroko_network:
    driver: bridge